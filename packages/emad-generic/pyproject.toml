[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "emad-generic"
version = "0.1.0"
description = "Generic eMAD — configurable conversational agent with no admin tools"
requires-python = ">=3.12"
dependencies = [
    "langgraph>=0.2.60",
    "langchain-core>=0.3.28",
    "langchain-openai>=0.2.14",
]

[project.entry-points."emad_host.emads"]
emad-generic = "emad_generic:build_graph"

[tool.setuptools.packages.find]
where = ["src"]
