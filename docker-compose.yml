# eMAD Host pMAD — Docker Compose
# State 4 MAD: standalone deployment, all dependencies configurable
#
# Usage:
#   1. Copy config/credentials/.env.example to config/credentials/.env
#   2. Fill in credentials
#   3. docker compose up -d --build
#
# All configuration is in .env — no override file needed.

services:

  emad-host:
    image: nginx:1.28.0-alpine
    container_name: emad-host
    hostname: emad-host
    restart: unless-stopped
    networks:
      - default
      - emad-host-net
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 60s
      retries: 3

  emad-host-langgraph:
    build:
      context: .
      dockerfile: Dockerfile
    image: emad-host-langgraph:latest
    container_name: emad-host-langgraph
    hostname: emad-host-langgraph
    restart: unless-stopped
    networks:
      - emad-host-net
    volumes:
      - ./config:/config
      - ./data:/data
      - ./config/runbooks:/config/runbooks:ro
      - ./emads:/emads
    env_file:
      - ./config/credentials/.env
    environment:
      - POSTGRES_HOST=emad-host-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-emad_host}
      - POSTGRES_USER=${POSTGRES_USER:-emad_host}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      start_period: 300s
      retries: 3

  emad-host-postgres:
    image: pgvector/pgvector:pg16
    container_name: emad-host-postgres
    hostname: emad-host-postgres
    restart: unless-stopped
    networks:
      - emad-host-net
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    env_file:
      - ./config/credentials/.env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-emad_host}
      - POSTGRES_USER=${POSTGRES_USER:-emad_host}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-emad_host}", "-d", "${POSTGRES_DB:-emad_host}"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  emad-host-log-shipper:
    build:
      context: ./log_shipper
    container_name: emad-host-log-shipper
    hostname: emad-host-log-shipper
    restart: unless-stopped
    networks:
      - emad-host-net
    group_add:
      - "${DOCKER_GID:-125}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - POSTGRES_DSN=postgresql://emad_host:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@emad-host-postgres:5432/emad_host
    env_file:
      - ./config/credentials/.env

  emad-host-dkron:
    image: dkron/dkron:4.1.0
    container_name: emad-host-dkron
    hostname: emad-host-dkron
    restart: unless-stopped
    networks:
      - emad-host-net
    volumes:
      - ./data/dkron:/dkron.data
      - ./config/dkron:/config/dkron:ro
    command: agent --server --bootstrap-expect=1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 30s
      retries: 3

  emad-host-ui:
    build:
      context: ./ui
    container_name: emad-host-ui
    hostname: emad-host-ui
    restart: unless-stopped
    networks:
      - emad-host-net
    volumes:
      - ./ui/config.yml:/app/config.yml:ro

  emad-host-alerter:
    build:
      context: ./alerter
    container_name: emad-host-alerter
    hostname: emad-host-alerter
    restart: unless-stopped
    networks:
      - emad-host-net
    environment:
      - POSTGRES_DSN=postgresql://emad_host:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@emad-host-postgres:5432/emad_host
      - ALERTER_CONFIG=/config/alerter.yml
    env_file:
      - ./config/credentials/.env
    volumes:
      - ./config:/config:ro

networks:
  emad-host-net:
    driver: bridge
